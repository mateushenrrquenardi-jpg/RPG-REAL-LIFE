<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>RPG da Vida Real — Mateus</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --c:#00F5FF;--c2:#FF2D78;--c3:#B026FF;
  --bg:#05030A;--s1:#0A0614;--s2:#100D1A;
  --text:#E8E0FF;--muted:#6B5E8A;
  --border:rgba(0,245,255,0.15);--border2:rgba(0,245,255,0.35);
}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:9999;}
.app{max-width:660px;margin:0 auto;padding:1.5rem 1rem 3rem;}
.hero-card{background:var(--s1);border:1px solid var(--border2);border-radius:4px;padding:1.25rem;margin-bottom:1rem;position:relative;overflow:hidden;}
.hero-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--c),var(--c3),transparent);}
.hero-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--c2),transparent);}
.hero-top{display:flex;align-items:center;gap:16px;}
.avatar-wrap{position:relative;flex-shrink:0;}
.avatar-wrap img{width:76px;height:76px;border-radius:4px;object-fit:cover;object-position:top center;border:1px solid var(--c);display:block;filter:saturate(1.1);}
.avatar-corner{position:absolute;width:9px;height:9px;border-color:var(--c2);border-style:solid;}
.avatar-corner.tl{top:-3px;left:-3px;border-width:2px 0 0 2px;}
.avatar-corner.tr{top:-3px;right:-3px;border-width:2px 2px 0 0;}
.avatar-corner.bl{bottom:-3px;left:-3px;border-width:0 0 2px 2px;}
.avatar-corner.br{bottom:-3px;right:-3px;border-width:0 2px 2px 0;}
.hero-info{flex:1;}
.hero-name{font-size:22px;font-weight:700;color:var(--c);letter-spacing:0.1em;text-transform:uppercase;font-family:'Share Tech Mono',monospace;}
.hero-class{font-size:12px;color:var(--c3);letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;font-family:'Share Tech Mono',monospace;}
.exp-wrap{margin-top:14px;}
.exp-header{display:flex;justify-content:space-between;margin-bottom:5px;}
.exp-lbl{font-size:10px;letter-spacing:0.14em;color:var(--muted);font-family:'Share Tech Mono',monospace;}
.exp-val{font-size:10px;color:var(--c);font-family:'Share Tech Mono',monospace;}
.exp-track{background:#0A0614;border:1px solid var(--border);border-radius:2px;height:7px;overflow:hidden;position:relative;}
.exp-fill{height:100%;background:linear-gradient(90deg,var(--c3),var(--c));border-radius:2px;transition:width 0.7s ease;}
.attrs{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:14px;}
.attr{background:var(--s2);border:1px solid var(--border);border-radius:3px;padding:10px 6px;text-align:center;position:relative;}
.attr::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--c3);opacity:0.5;}
.attr-lbl{font-size:9px;letter-spacing:0.14em;color:var(--muted);text-transform:uppercase;font-family:'Share Tech Mono',monospace;}
.attr-val{font-size:24px;font-weight:700;color:var(--c);font-family:'Share Tech Mono',monospace;line-height:1.2;}









.tabs{display:flex;gap:4px;margin-bottom:1rem;}
.tab{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:0.12em;padding:8px 16px;border-radius:2px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.2s;text-transform:uppercase;}
.tab:hover{color:var(--c);border-color:rgba(0,245,255,0.3);}
.tab.active{background:rgba(0,245,255,0.06);border-color:var(--c);color:var(--c);}
.panel{background:var(--s1);border:1px solid var(--border);border-radius:4px;padding:1.25rem;margin-bottom:1rem;}
.panel-title{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:0.18em;color:var(--c3);text-transform:uppercase;margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
.panel-title::after{content:'';flex:1;height:1px;background:var(--border);}
.add-form{display:flex;flex-direction:column;gap:8px;}
.form-row{display:flex;gap:8px;}
input[type=text],select{background:var(--s2);border:1px solid var(--border);border-radius:2px;padding:9px 12px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;outline:none;width:100%;transition:border-color 0.2s;}
input[type=text]::placeholder{color:var(--muted);}
input[type=text]:focus,select:focus{border-color:var(--c);}
select option{background:var(--s2);}
.btn-add{background:transparent;border:1px solid var(--c);border-radius:2px;padding:9px 18px;color:var(--c);font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:0.12em;cursor:pointer;transition:all 0.2s;text-transform:uppercase;white-space:nowrap;}
.btn-add:hover{background:rgba(0,245,255,0.08);}
.quest-list{display:flex;flex-direction:column;gap:6px;}
.quest-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:2px;background:var(--s2);transition:border-color 0.2s;}
.quest-item:hover{border-color:rgba(0,245,255,0.25);}
.quest-item.diaria{border-left:2px solid var(--c);}
.quest-item.concluida{opacity:0.3;}
.quest-info{flex:1;min-width:0;}
.quest-name{font-size:15px;color:var(--text);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.quest-meta{font-size:10px;color:var(--muted);margin-top:2px;font-family:'Share Tech Mono',monospace;letter-spacing:0.06em;}
.badge{display:inline-block;font-size:9px;letter-spacing:0.08em;padding:1px 6px;border-radius:1px;margin-right:4px;font-family:'Share Tech Mono',monospace;}
.badge-main{background:rgba(176,38,255,0.15);color:var(--c3);border:1px solid rgba(176,38,255,0.4);}
.badge-side{background:rgba(0,245,255,0.07);color:var(--muted);border:1px solid var(--border);}
.badge-diaria{background:rgba(0,245,255,0.1);color:var(--c);border:1px solid rgba(0,245,255,0.3);}
.quest-btns{display:flex;gap:5px;flex-shrink:0;}
.btn-done{background:transparent;border:1px solid var(--c);border-radius:2px;padding:4px 10px;color:var(--c);font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:0.08em;cursor:pointer;transition:all 0.2s;text-transform:uppercase;}
.btn-done:hover{background:rgba(0,245,255,0.1);}
.btn-done:disabled{opacity:0.2;cursor:not-allowed;}
.btn-del{background:transparent;border:1px solid rgba(255,45,120,0.2);border-radius:2px;padding:4px 8px;color:rgba(255,45,120,0.45);font-family:'Share Tech Mono',monospace;font-size:9px;cursor:pointer;transition:all 0.2s;}
.btn-del:hover{border-color:var(--c2);color:var(--c2);}
.hist-list{display:flex;flex-direction:column;gap:5px;max-height:320px;overflow-y:auto;}
.hist-item{padding:8px 12px;border-left:2px solid var(--c3);background:var(--s2);border-radius:0 2px 2px 0;}
.hist-name{font-size:14px;color:var(--text);font-weight:600;}
.hist-meta{font-size:10px;color:var(--muted);margin-top:2px;font-family:'Share Tech Mono',monospace;}
.levelup{background:rgba(176,38,255,0.1);border:1px solid var(--c3);border-radius:3px;padding:14px;text-align:center;font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--c3);margin-bottom:1rem;display:none;letter-spacing:0.1em;text-transform:uppercase;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--s1);border:1px solid var(--c);border-radius:2px;padding:10px 20px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--c);opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;z-index:200;letter-spacing:0.08em;}
.toast.show{opacity:1;}
.empty{font-size:12px;color:var(--muted);text-align:center;padding:1.5rem 0;font-family:'Share Tech Mono',monospace;letter-spacing:0.08em;}
.loading{color:var(--muted);font-size:11px;text-align:center;padding:1rem 0;font-family:'Share Tech Mono',monospace;letter-spacing:0.08em;}
.divider{border:none;border-top:1px solid var(--border);margin:1rem 0;}
</style>
</head>

<script>
const API='https://script.google.com/macros/s/AKfycbx_NKGI8-BRmR-IBqFt1dRjxH3Oz5Ek-pZxDo9oEXSk2lSTaZBT0KIZ8NOCxDzSHwVf/exec';
const CLAUDE='https://api.anthropic.com/v1/messages';
const TITLES=[[1,'Iniciante'],[5,'Aventureiro'],[10,'Guerreiro'],[15,'Campeão'],[20,'Herói'],[30,'Lendário'],[50,'Mítico']];
function getTitle(n){let t='Iniciante';for(const[l,name]of TITLES){if(n>=l)t=name;}return t;}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3000);}
function showTab(tab){
  document.getElementById('tab-quests').style.display=tab==='quests'?'':'none';
  document.getElementById('tab-historico').style.display=tab==='historico'?'':'none';
  document.querySelectorAll('.tab').forEach((t,i)=>{t.classList.toggle('active',(i===0&&tab==='quests')||(i===1&&tab==='historico'));});
  if(tab==='historico')loadHistorico();
}
async function call(params){const res=await fetch(API+'?'+new URLSearchParams(params));return res.json();}
async function loadHero(){
  try{
    const h=await call({action:'getHero'});
    const pct=Math.round((h.exp_atual/h.exp_necessaria)*100);
    document.getElementById('exp-fill').style.width=pct+'%';
    document.getElementById('exp-val').textContent=h.exp_atual+' / '+h.exp_necessaria;
    document.getElementById('hero-class').textContent='// '+getTitle(h.nivel).toUpperCase()+' — NV.'+h.nivel;
    document.getElementById('a-forca').textContent=h.forca;
    document.getElementById('a-magia').textContent=h.magia;
    document.getElementById('a-carisma').textContent=h.carisma;
    document.getElementById('a-intel').textContent=h.inteligencia;
  }catch(e){toast('Erro ao carregar herói.');}
}
async function loadQuests(){
  try{
    const quests=await call({action:'getQuests'});
    const diarias=quests.filter(q=>q.tipo==='diaria');
    const ativas=quests.filter(q=>q.tipo!=='diaria'&&q.status==='ativa');
    const ds=document.getElementById('daily-section');
    const dl=document.getElementById('daily-list');
    if(diarias.length){
      ds.style.display='';
      dl.innerHTML=diarias.map(q=>{const done=q.status==='concluida';return`<div class="quest-item diaria${done?' concluida':''}"><div class="quest-info"><div class="quest-name">${q.nome}</div><div class="quest-meta"><span class="badge badge-diaria">DIÁRIA ↺</span>${cap(q.atributo)}</div></div><div class="quest-btns"><button class="btn-done" onclick="completeQuest('${q.id}')" ${done?'disabled':''}>${done?'DONE':'OK'}</button><button class="btn-del" onclick="deleteQuest('${q.id}')">✕</button></div></div>`;}).join('');
    }else{ds.style.display='none';}
    const ql=document.getElementById('quest-list');
    if(!ativas.length){ql.innerHTML='<div class="empty">Nenhuma quest ativa.</div>';}
    else{ql.innerHTML=ativas.map(q=>`<div class="quest-item"><div class="quest-info"><div class="quest-name">${q.nome}</div><div class="quest-meta"><span class="badge ${q.tipo==='principal'?'badge-main':'badge-side'}">${q.tipo==='principal'?'PRINCIPAL':'SIDE'}</span>${cap(q.atributo)}</div></div><div class="quest-btns"><button class="btn-done" onclick="completeQuest('${q.id}')">OK</button><button class="btn-del" onclick="deleteQuest('${q.id}')">✕</button></div></div>`).join('');}
  }catch(e){toast('Erro ao carregar quests.');}
}
async function addQuest(){
  const nome=document.getElementById('q-nome').value.trim();
  if(!nome){toast('Digite o nome da quest!');return;}
  const tipo=document.getElementById('q-tipo').value;
  const atrib=document.getElementById('q-atrib').value;
  try{await call({action:'addQuest',nome,tipo,atributo:atrib});document.getElementById('q-nome').value='';toast('Quest adicionada.');loadQuests();}
  catch(e){toast('Erro ao adicionar.');}
}
async function completeQuest(id){
  try{
    const r=await call({action:'completeQuest',id});
    if(r.error){toast('Erro: '+r.error);return;}
    if(r.levelUp){const b=document.getElementById('levelup');b.textContent='>> LEVEL UP // NV.'+r.nivel+' — '+getTitle(r.nivel).toUpperCase()+' <<';b.style.display='block';setTimeout(()=>b.style.display='none',4000);}
    else{toast('+'+r.expGanho+' EXP  +'+r.pontosAtrib+' '+String(r.atributo).toUpperCase());}
    loadHero();loadQuests();
  }catch(e){toast('Erro ao concluir.');}
}
async function deleteQuest(id){try{await call({action:'deleteQuest',id});toast('Quest removida.');loadQuests();}catch(e){toast('Erro ao remover.');}}
async function loadHistorico(){
  try{
    const hist=await call({action:'getHistorico'});
    const list=document.getElementById('hist-list');
    if(!hist.length){list.innerHTML='<div class="empty">Nenhum registro ainda.</div>';return;}
    list.innerHTML=hist.slice(0,40).map(h=>`<div class="hist-item"><div class="hist-name">${h.acao}</div><div class="hist-meta">+${h.exp_ganho} EXP  +${h.pontos} ${String(h.atributo).toUpperCase()}  NV.${h.nivel_atual}  ${h.data}</div></div>`).join('');
  }catch(e){toast('Erro ao carregar log.');}
}
async function newDay(){
  document.getElementById('modal').style.display='flex';
  document.getElementById('modal-msg').className='modal-msg loading';
  document.getElementById('modal-msg').textContent='Conectando ao oráculo...';
  try{await call({action:'resetDailies'});}catch(e){}
  try{
